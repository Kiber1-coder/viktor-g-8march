<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>С 8 Марта!</title>
    <!-- Подключаем красивый шрифт от Google -->
    <link
      href="https://fonts.googleapis.com/css2?family=Marck+Script&family=Montserrat:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="header">
          <h1>С 8 Марта!</h1>
          <div class="heart">❤️</div>
        </div>

        <div class="image-wrapper">
          <!-- 
                     ВАЖНО: Замени 'photo.jpg' на имя твоего файла с картинкой.
                     Если картинка лежит в той же папке, что и этот файл.
                -->
          <img src="photo.jpg" alt="Милая девушка" class="main-photo" />
        </div>

        <div class="content">
          <p>
            Моя дорогая! Поздравляю тебя с самым весенним праздником.
            <br /><br />
            Ты — как первый луч солнца, который дарит тепло и радость. Оставайся
            такой же прекрасной, нежной и улыбчивой. Пусть каждый твой день
            будет наполнен цветами, комплиментами и счастьем.
          </p>
          <p class="signature">С любовью, Твой [Имя]</p>
        </div>
      </div>
    </div>
  </body>
</html>
